<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Account Page</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f2f2f2;
  padding-bottom:100px;
}

/* HEADER */

.header{
  background:#2c00cc;
  color:white;
  padding:20px;
  font-size:35px;
  font-weight:bold;
}

/* PROFILE */

.profile-card{
  display:flex;
  align-items:center;
  padding:20px;
}

.profile-left img{
  width:90px;
  height:90px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid black;
  cursor:pointer;
}

.profile-info{
  margin-left:15px;
}

.profile-info p{
  margin:0;
  font-size:20px;
}

.profile-info h2{
  margin:0;
  font-size:40px;
}

.stars{
  color:#777;
  margin-top:5px;
}

/* SECTION */

.section{
  padding:20px;
}

.section h3{
  border-bottom:2px solid #bbb;
  padding-bottom:10px;
}

/* DASHBOARD */

.stats{
  display:flex;
  justify-content:space-between;
  margin:15px 0;
  font-size:20px;
}

/* BUTTONS */

.menu-btn{
  width:100%;
  padding:15px;
  margin-top:10px;
  border:none;
  border-radius:15px;
  background:white;
  font-size:18px;
  text-align:left;
  box-shadow:0 3px 8px rgba(0,0,0,0.2);
  cursor:pointer;
  transition:0.2s;
}

.menu-btn:hover{
  background:#eee;
}

/* OFFLINE BOX */

.offline-box{
  background:white;
  margin-top:12px;
  padding:15px;
  border-radius:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 3px 8px rgba(0,0,0,0.2);
}

.offline-left{
  font-size:18px;
  font-weight:bold;
}

/* SWITCH */

.switch{
  position:relative;
  display:inline-block;
  width:55px;
  height:30px;
}

.switch input{
  opacity:0;
  width:0;
  height:0;
}

.slider{
  position:absolute;
  cursor:pointer;
  top:0;
  left:0;
  right:0;
  bottom:0;
  background:#ccc;
  transition:.4s;
  border-radius:34px;
}

.slider:before{
  position:absolute;
  content:"";
  height:22px;
  width:22px;
  left:4px;
  bottom:4px;
  background:white;
  transition:.4s;
  border-radius:50%;
}

input:checked + .slider{
  background:#32d74b;
}

input:checked + .slider:before{
  transform:translateX(24px);
}

/* SAVED ROUTES */

.saved-box{
  margin:20px;
  padding:20px;
  background:white;
  border-radius:20px;
  display:none;
  box-shadow:0 3px 8px rgba(0,0,0,0.2);
}

/* LOGOUT */

.logout{
  color:red;
  text-align:center;
  font-weight:bold;
  cursor:pointer;
  margin-top:30px;
}

/* NAVBAR */

.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
}

.nav-item{
  text-align:center;
  font-size:12px;
  cursor:pointer;
}

.report-btn{
  background:red;
  padding:15px;
  border-radius:15px;
  color:black;
  font-weight:bold;
  margin-top:-20px;
}

/* ========================= */
/* OFFLINE POPUP */
/* ========================= */

.popup-overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.popup-box{
  width:320px;
  background:white;
  border-radius:25px;
  padding:25px;
  text-align:center;
  box-shadow:0 8px 25px rgba(0,0,0,0.3);
  animation:popupFade 0.3s ease;
}

.popup-icon{
  font-size:70px;
  margin-bottom:10px;
}

.popup-title{
  font-size:26px;
  font-weight:bold;
  margin-bottom:10px;
}

.popup-sub{
  color:#666;
  font-size:18px;
  margin-bottom:10px;
}

.popup-time{
  color:#999;
  font-size:14px;
  margin-bottom:25px;
}

.popup-buttons{
  display:flex;
  gap:10px;
}

.popup-btn{
  flex:1;
  padding:14px;
  border:none;
  border-radius:14px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

.okay-btn{
  background:#ddd;
}

.routes-btn{
  background:#2c00cc;
  color:white;
}

@keyframes popupFade{
  from{
    transform:scale(0.8);
    opacity:0;
  }

  to{
    transform:scale(1);
    opacity:1;
  }
}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">
  ACCOUNT
</div>

<!-- PROFILE -->

<div class="profile-card">

  <div class="profile-left">

    <img
    id="profilePic"
    src="https://cdn-icons-png.flaticon.com/512/149/149071.png">

    <input
    type="file"
    id="uploadPic"
    accept="image/*"
    hidden>

  </div>

  <div class="profile-info">

    <h2 id="displayName">@MariaS</h2>

    <div class="stars"
id="starText">
⭐ 3-Star Contributor
</div>

  </div>

</div>

<!-- DASHBOARD -->

<div class="section">

<h3>My Dashboard</h3>

<div class="stats">
  <span>Minutes saved (Month):</span>
  <b>120</b>
</div>

<div class="stats">
  <span>Reports Vouched:</span>
  <b>45</b>
</div>

</div>

<!-- SECURITY -->

<div class="section">

<h3>Security</h3>

<button
class="menu-btn"
onclick="openSavedRoutesPage()">
🔖 Saved Routes
</button>

<button
class="menu-btn"
onclick="changeName()">
👤 Change Name
</button>

<button
class="menu-btn"
onclick="changePassword()">
🔒 Change Password
</button>

<button
class="menu-btn"
onclick="changePhoto()">
📷 Change Profile Picture
</button>

<!-- OFFLINE SCHEDULE -->

<div class="offline-box">

<div class="offline-left">
⬇️ Download Offline Schedules
</div>

<label class="switch">

<input
type="checkbox"
id="offlineToggle">

<span class="slider"></span>

</label>

</div>

</div>

<!-- SAVED ROUTES BOX -->


<!-- OFFLINE POPUP -->

<div class="popup-overlay" id="offlinePopup">

  <div class="popup-box">

    <div class="popup-icon">
      🔄
    </div>

    <div class="popup-title">
      OFFLINE SCHEDULES<br>
      SYNCING COMPLETE
    </div>

    <div class="popup-sub">
      Your routes are now available offline
    </div>

    <div class="popup-time" id="syncTime">
      Last Synced: Just now
    </div>

    <div class="popup-buttons">

      <button
      class="popup-btn okay-btn"
      onclick="closePopup()">
      OKAY
      </button>

      <button
      class="popup-btn routes-btn"
      onclick="openRoutesPage()">
      OPEN ROUTES
      </button>

    </div>

  </div>

</div>

<!-- LOGOUT -->

<p class="logout" onclick="logout()">
&lt; LOG OUT &gt;
</p>

<!-- NAVBAR -->

<div class="nav">

  <div class="nav-item"
  onclick="goHome()">
  🏠<br>HOME
  </div>

  <div class="nav-item"
  onclick="goRoutes()">
  🗺️<br>ROUTES
  </div>

  <div class="nav-item report-btn"
  onclick="goReport()">
  REPORT
  </div>

  <div class="nav-item"
  onclick="goCommunity()">
  🔔<br>COMMUNITY
  </div>

  <div class="nav-item"
  onclick="goAccount()">
  👤<br>ACCOUNT
  </div>

</div>

<script>

/* LOAD NAME */

const savedName =
localStorage.getItem("profileName");

if(savedName){

document.getElementById(
"displayName"
).innerText = savedName;

}

/* LOAD PHOTO */

const savedPhoto =
localStorage.getItem("profilePhoto");

if(savedPhoto){

document.getElementById(
"profilePic"
).src = savedPhoto;

}

/* LOAD ACCOUNT STARS */

let accountStars =
parseInt(localStorage.getItem("accountStars")) || 3;

document.getElementById(
"starText"
).innerText =
"⭐" + accountStars + "-Star Contributor";

/* CHANGE NAME */

function changeName(){

const newName =
prompt("Enter new name:");

if(newName && newName.trim() !== ""){

localStorage.setItem(
"profileName",
newName
);

document.getElementById(
"displayName"
).innerText = newName;

}

}

/* CHANGE PHOTO */

function changePhoto(){

document.getElementById(
"uploadPic"
).click();

}

document.getElementById(
"uploadPic"
).addEventListener(
"change",
function(event){

const file =
event.target.files[0];

if(file){

const reader =
new FileReader();

reader.onload = function(e){

document.getElementById(
"profilePic"
).src = e.target.result;

localStorage.setItem(
"profilePhoto",
e.target.result
);

};

reader.readAsDataURL(file);

}

});

/* SAVED ROUTES */

function openSavedRoutes(){

const box =
document.getElementById(
"savedBox"
);

if(box.style.display === "block"){

box.style.display = "none";

}
else{

box.style.display = "block";

showSavedRoutes();

}

}

/* SHOW SAVED ROUTES */

function showSavedRoutes(){

let routes =
JSON.parse(
localStorage.getItem("savedRoutes")
) || [];

const routeList =
document.getElementById(
"savedRoutesList"
);

if(routes.length === 0){

routeList.innerHTML =
"No saved routes yet.";

return;

}

routeList.innerHTML = "";

routes.forEach((route,index) => {

routeList.innerHTML += `

<div style="
background:#f2f2f2;
padding:12px;
border-radius:12px;
margin-top:10px;
display:flex;
justify-content:space-between;
align-items:center;
">

<span>🚌 ${route}</span>

<button
onclick="deleteRoute(${index})"
style="
background:red;
color:white;
border:none;
padding:8px 12px;
border-radius:10px;
cursor:pointer;
">
Delete
</button>

</div>

`;

});

}

/* DELETE ROUTE */

function deleteRoute(index){

let routes =
JSON.parse(
localStorage.getItem("savedRoutes")
) || [];

routes.splice(index,1);

localStorage.setItem(
"savedRoutes",
JSON.stringify(routes)
);

showSavedRoutes();

}

/* CHANGE PASSWORD */

function changePassword(){

window.location.href =
"reset.html";

}

/* LOGOUT */

function logout(){

localStorage.removeItem("user");

window.location.href =
"finalweb.html";

}

/* ========================= */
/* OFFLINE DOWNLOAD */
/* ========================= */

const toggle =
document.getElementById(
"offlineToggle"
);

toggle.addEventListener(
"change",
function(){

if(toggle.checked){

localStorage.setItem(
"offlineMode",
"true"
);

/* UPDATE SYNC TIME */

const now =
new Date().toLocaleTimeString();

document.getElementById(
"syncTime"
).innerText =
"Last Synced: " + now;

/* SHOW POPUP */

document.getElementById(
"offlinePopup"
).style.display = "flex";

}
else{

localStorage.setItem(
"offlineMode",
"false"
);

alert(
"Offline schedules removed!"
);

}

});

/* CLOSE POPUP */

function closePopup(){

document.getElementById(
"offlinePopup"
).style.display = "none";

}

/* OPEN ROUTES BUTTON FUNCTION */

function openRoutesPage(){

window.location.href =
"routes.html";

}

/* NAVIGATION */

function goHome(){
window.location.href = "home.html";
}

function goRoutes(){
window.location.href = "routes.html";
}

function goCommunity(){
window.location.href = "community.html";
}

function goReport(){
window.location.href = "report.html";
}

function goAccount(){
window.location.href = "account.html";
}


function openSavedRoutesPage(){

window.location.href =
"savedroutes.html";

}




</script>

</body>
</html>
