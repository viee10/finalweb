<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Saved Routes</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#e9e9e9;
  padding-bottom:100px;
}

/* HEADER */

.header{
  background:#2c008f;
  color:white;
  padding:20px;
  display:flex;
  align-items:center;
  gap:15px;
  font-weight:bold;
  font-size:32px;
}

.back-btn{
  font-size:35px;
  cursor:pointer;
}

/* ROUTE CARD */

.route-card{
  background:white;
  margin:20px;
  border-radius:20px;
  padding:15px;
  box-shadow:0 5px 12px rgba(0,0,0,0.3);
}

/* TOP */

.route-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.route-title{
  font-size:28px;
  font-weight:bold;
}

/* IMAGE */

.route-map{
  width:100%;
  height:230px;
  object-fit:cover;
  border-radius:15px;
  margin-top:10px;
  cursor:pointer;
}

/* STOPS */

.stops{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  margin-top:20px;
  gap:5px;
}

.stop{
  text-align:center;
  flex:1;
  font-size:12px;
  word-wrap:break-word;
}

.dot{
  width:18px;
  height:18px;
  background:black;
  border-radius:50%;
  margin:auto;
  margin-bottom:8px;
}

/* TEXT */

.offline-text{
  margin-top:10px;
  font-size:20px;
}

/* BUTTON */

.active-btn{
  width:100%;
  margin-top:20px;
  padding:15px;
  border:none;
  border-radius:12px;
  background:#2c008f;
  color:white;
  font-size:20px;
  font-weight:bold;
  cursor:pointer;
}

.active{
  background:#32d74b !important;
  color:black;
}

/* DELETE BUTTON */

.delete-btn{
  background:#ff3b30;
  border:none;
  color:white;
  width:32px;
  height:32px;
  border-radius:50%;
  font-size:16px;
  cursor:pointer;
}

/* HEADER ROW */

.header-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* IMAGE POPUP */

.image-popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.image-popup img{
  width:90%;
  max-height:85%;
  border-radius:20px;
  object-fit:contain;
}

.close-image{
  position:absolute;
  top:20px;
  right:25px;
  color:white;
  font-size:45px;
  cursor:pointer;
}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

<div class="back-btn" onclick="goBack()">←</div>

<div>SAVED ROUTES</div>

</div>

<!-- ROUTES CONTAINER -->

<div id="routesContainer"></div>

<!-- IMAGE POPUP -->

<div class="image-popup" id="imagePopup">
  <div class="close-image" onclick="closeImage()">✕</div>
  <img id="popupImage">
</div>

<script>

/* BACK */

function goBack(){
window.location.href = "account.html";
}

/* LOAD ROUTES */

loadRoutes();

function loadRoutes(){

const container =
document.getElementById("routesContainer");

let savedRoutes =
JSON.parse(localStorage.getItem("savedRoutes")) || [];

savedRoutes = savedRoutes.filter(r => typeof r === "object");

if(savedRoutes.length === 0){
container.innerHTML =
"<p style='padding:20px;'>No saved routes yet.</p>";
return;
}

container.innerHTML = "";

savedRoutes.forEach(route => {

const activeRoute =
localStorage.getItem("activeRoute");

const isActive =
activeRoute === route.name;

container.innerHTML += `

<div class="route-card">

<div class="header-row">

<div class="route-title">⭐ ${route.name}</div>

<button class="delete-btn"
onclick="deleteRoute('${route.id}')">🗑️</button>

</div>

<img class="route-map"
onclick="openImage('${route.image}')"
src="${route.image}">

<div class="offline-text">
<b>OFFLINE:</b> ${route.path}
</div>

<div class="stops">

${route.stops.map(stop => `
<div class="stop">
<div class="dot"></div>
${stop}
</div>
`).join("")}

</div>

<button class="active-btn ${isActive ? 'active' : ''}"
onclick="toggleActiveRoute('${route.name}')">

${isActive ? 'ACTIVE ROUTE' : 'SET AS ACTIVE'}

</button>

</div>

`;

});

}

/* DELETE ROUTE */

function deleteRoute(id){

let savedRoutes =
JSON.parse(localStorage.getItem("savedRoutes")) || [];

savedRoutes = savedRoutes.filter(r => r.id != id);

localStorage.setItem(
"savedRoutes",
JSON.stringify(savedRoutes)
);

loadRoutes();

}

/* TOGGLE ACTIVE */

function toggleActiveRoute(routeName){

let activeRoute =
localStorage.getItem("activeRoute");

if(activeRoute === routeName){
localStorage.removeItem("activeRoute");
alert("Removed as active");
}
else{
localStorage.setItem("activeRoute", routeName);
alert("Set as active");
}

loadRoutes();

}

/* IMAGE */

function openImage(src){

document.getElementById("popupImage").src = src;
document.getElementById("imagePopup").style.display = "flex";

}

function closeImage(){
document.getElementById("imagePopup").style.display = "none";
}

</script>

</body>
</html>
