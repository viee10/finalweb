<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reset Password</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f2f2f2;
}

/* HEADER */
.header{
  background:#2c00cc;
  color:white;
  padding:18px;
  font-size:26px;
  font-weight:bold;
  text-align:center;
  position:relative;
}

.back{
  position:absolute;
  left:15px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  font-size:28px;
}

/* CONTAINER */
.container{
  width:90%;
  max-width:400px;
  margin:60px auto;
  background:white;
  padding:30px;
  border-radius:20px;
  box-shadow:0 5px 10px rgba(0,0,0,0.2);
}

/* INPUTS */
.input-box{
  width:100%;
  padding:14px;
  margin-top:15px;
  border:none;
  border-radius:12px;
  background:#f2f2f2;
  font-size:16px;
  box-sizing:border-box;
}

/* BUTTON */
.submit-btn{
  width:100%;
  padding:15px;
  margin-top:25px;
  background:#1800cc;
  color:white;
  border:none;
  border-radius:20px;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
}

.submit-btn:hover{
  opacity:0.9;
}

</style>
</head>

<body>

<div class="header">

<div class="back" onclick="goBack()">←</div>

RESET PASSWORD

</div>

<div class="container">

<input
type="email"
id="email"
class="input-box"
placeholder="Enter your email">

<input
type="password"
id="newPassword"
class="input-box"
placeholder="Enter new password">

<button
class="submit-btn"
onclick="resetPassword()">

CHANGE PASSWORD

</button>

</div>

<script>

const API = "http://127.0.0.1:3000";

/* RESET PASSWORD */
async function resetPassword(){

const email =
document.getElementById("email").value.trim();

const newPassword =
document.getElementById("newPassword").value.trim();

if(!email || !newPassword){

alert("Please complete all fields");
return;

}

try{

const res = await fetch("http://localhost:3000/reset", {

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
email,
newPassword
})

});

const text = await res.text();

console.log(text);

let data;

try{
data = JSON.parse(text);
}catch{
alert("Server returned invalid response");
return;
}

if(data.success){

alert("Password Changed!");

window.location.href = "finalweb.html";

}else{

alert(data.message || "Reset Failed");

}

}catch(err){

console.log(err);

alert("Cannot connect to server");

}

}

/* BACK */
function goBack(){
window.location.href = "account.html";
}

</script>

</body>
</html>
