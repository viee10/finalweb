<!DOCTYPE html>
<html lang="en">
<head>

<title>Community</title>

<style>

.header {
  background: #2c00cc;
  color: white;
  padding: 15px;
  font-size: 24px;

}

/* CONTENT */
.container {

}

}

.actions {
  margin-top: 10px;
  display: flex;
  justify-content: space-between;
}

/* NAV */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: rgb(255, 255, 255);
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
}

.nav-item {
  text-align: center;
  font-size: 12px;
}

.report-btn {

  padding: 15px;

  color: black;
  font-weight: bold;
