<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login / Sign Up</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f2f2f2;
    }

    /* Top Bar */
    .top-bar {
      background: #2c00cc;
      height: 80px;
      display: flex;
      align-items: center;
      padding: 0 20px;
    }

    .back-btn {
      width: 40px;
      height: 40px;
      border: 2px solid black;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 20px;
    }


    .logo {
      width: 150px;
      margin: 20px auto;
    }

    h2 {
      margin-bottom: 30px;
    }

    /* Inputs */
    .input-box {
      width: 80%;
      max-width: 400px;
      margin: 10px auto;
      padding: 15px;
      border: none;
      border-radius: 5px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
      font-size: 16px;
    }

    .forgot {
      color: #e74c3c;
      margin: 15px 0;
      display: block;
      text-decoration: none;
    }

    /* Button */
    .submit-btn {
      width: 80%;
      max-width: 400px;
      padding: 15px;
      background: #ff2d2d;
      border: none;
      border-radius: 25px;
      color: white;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
    }

    .submit-btn:hover {
      background: #e60000;
    }body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;   /* center horizontally */
  align-items: center;       /* center vertically */
  font-family: Arial, sans-serif;
  background: #f2f2f2;
}

.container {
  width: 300px;
  padding: 30px;
  background: white;
  border-radius: 10px;
  box-shadow: 0 0 15px rgba(0,0,0,0.1);
  text-align: center;
}



  </style>
</head>
<body>


 <div class="container">
  <img src="c:\Users\Kervy Ibay\Downloads\images-removebg-preview.png" class="logo" alt="Logo">

  <h2>USER LOG IN / SIGN UP</h2>

  <input type="email" id="email" class="input-box" placeholder="EMAIL">
  <input type="password" id="password" class="input-box" placeholder="PASSWORD">

  <a href="reset.html" class="forgot">FORGOT YOUR PASSWORD?</a>

  <button class="submit-btn" onclick="login()">SUBMIT</button>

  <button onclick="register()">REGISTER</button>

</div>

  <script>


  const BASE_URL = "http://127.0.0.1:3000";

async function login() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  try {
    const res = await fetch(`${BASE_URL}/login`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();
    console.log(data);

    if (data.success) {
  alert("Login successful!");

  // SAVE USER LOGIN STATE
  localStorage.setItem("user", email);

  window.location.href = "welcome.html";
}

  } catch (error) {
    console.log("Error:", error);
    alert("Cannot connect to server");
  }
}

async function register() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  try {
    const res = await fetch(`${BASE_URL}/register`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (data.success) {
      alert("Registered! You can now login.");
    } else {
      alert(data.message);
    }

  } catch (error) {
    console.log("Error:", error);
    alert("Cannot connect to server");
  }
}

  </script>

</body>
</html>
