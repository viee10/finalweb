<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Report</title>

<style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f2f2f2;
}

/* HEADER */
.header {
  background: #2c00cc;
  color: white;
  padding: 15px;
  font-size: 24px;
  font-weight: bold;
  position: relative;
}

/* BACK ARROW */
.back-arrow{
  position:absolute;
  left:15px;
  top:50%;
  transform:translateY(-50%);
  font-size:28px;
  cursor:pointer;
  font-weight:bold;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  padding: 20px;
}

/* BOX */
.box {
  height: 150px;
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-weight: bold;
  font-size: 22px;
  box-shadow: 0 6px 10px rgba(0,0,0,0.2);
  cursor: pointer;
  transition: 0.2s;
}

.box small {
  font-size: 12px;
  margin-top: 5px;
}

/* COLORS */
.green { background: #10b35a; color: white; }
.yellow { background: #f4c400; }
.red { background: #ff2d2d; color: white; }
.gray { background: #ddd; }

/* SELECTED */
.selected {
  outline: 4px solid #2c00cc;
}

/* BUTTON */
.btn {
  width: 90%;
  margin: 20px auto;
  display: block;
  padding: 15px;
  background: #1800cc;
  color: white;
  border: none;
  border-radius: 20px;
  font-size: 18px;
  cursor: pointer;
}

/* CANCEL */
.cancel {
  text-align: center;
  color: red;
  margin-bottom: 20px;
  cursor: pointer;
}

/* NAV */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: rgb(250, 250, 250);
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
}

.nav-item {
  text-align: center;
  font-size: 12px;
}

.report-btn {
  background: red;
  padding: 15px;
  border-radius: 15px;
  color: black;
  font-weight: bold;
  margin-top: -20px;
}

/* FORM */
.fare-box{
  display:flex;
  gap:10px;
  align-items:center;
}

.fare-box select,
.fare-box input{
  padding:12px;
  border:none;
  border-radius:10px;
  font-size:16px;
}

.submit-btn{
  width:100%;
  padding:15px;
  margin-top:20px;
  background:#1800cc;
  color:white;
  border:none;
  border-radius:20px;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
}

.cancel-btn-container{
  display:flex;
  justify-content:center;
  margin-top:15px;
}

.cancel-btn{
  color:red;
  font-weight:bold;
  cursor:pointer;
  font-size:18px;
}


.header{
  position:relative;
  display:flex;
  align-items:center;
}

/* TITLE SPACING */
.title-text{
  margin-left:50px; /* this creates space from arrow */
  font-size:24px;
  font-weight:bold;
}



</style>

</head>

<body>

<!-- HEADER -->
<div class="header">

  <div class="back-arrow" onclick="goBack()">←</div>

  <div class="title-text">REPORT</div>

</div>

<!-- SELECT SCREEN -->
<div id="selectScreen">

  <div class="grid">

    <div class="box green" onclick="selectBox(this,'EMPTY - LARGA')">
      EMPTY - LARGA
      <small>Plenty of Jeeps</small>
    </div>

    <div class="box yellow" onclick="selectBox(this,'MODERATE')">
      MODERATE
      <small>Wait < 10 mins</small>
    </div>

    <div class="box red" onclick="selectBox(this,'SUPER PUNO')">
      SUPER PUNO
      <small>Wait > 20 mins</small>
    </div>

    <div class="box gray" onclick="selectBox(this,'NO JEEPS')">
      NO JEEPS
      <small>Wala pa</small>
    </div>

  </div>

  <button class="btn" onclick="goNext()">NEXT</button>

  <div class="cancel" onclick="goHome()">
    < CANCEL >
  </div>

</div>

<!-- FORM SCREEN -->
<div id="formScreen" style="display:none; padding:20px;">

  <h2>MAP MARKET PLACEMENT</h2>
  <input placeholder="Map marker Area...." style="width:100%; padding:10px;">

  <h2>TEXT DESCRIPTION</h2>
  <textarea style="width:100%; height:100px;"></textarea>

  <h2>JEEPNEY FARE</h2>

  <div class="fare-box">

    <select id="fareType">
      <option>Standard Fare</option>
      <option>Student Fare</option>
      <option>Senior Citizen Fare</option>
    </select>

    <input type="text" placeholder="₱ Fare">

  </div>

  <button class="submit-btn" onclick="submitFinal()">
    SUBMIT REPORT
  </button>

  <div class="cancel-btn-container">
    <p class="cancel-btn" onclick="goBack()">
      < CANCEL >
    </p>
  </div>

</div>

<!-- NAV -->
<div class="nav">

  <div class="nav-item" onclick="goHome()">🏠<br>HOME</div>
  <div class="nav-item" onclick="goRoutes()">🗺️<br>ROUTES</div>
  <div class="nav-item report-btn" onclick="goReport()">REPORT</div>
  <div class="nav-item" onclick="goCommunity()">🔔<br>COMMUNITY</div>
  <div class="nav-item" onclick="goAccount()">👤<br>ACCOUNT</div>

</div>

<script>

let selectedReport = "";

/* SELECT BOX */
function selectBox(el, value){
  document.querySelectorAll('.box').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  selectedReport = value;
}

/* NEXT */
function goNext(){
  if(!selectedReport){
    alert("Please select first!");
    return;
  }

  document.getElementById("selectScreen").style.display = "none";
  document.getElementById("formScreen").style.display = "block";
}

/* BACK BUTTON */
function goBack(){

const form = document.getElementById("formScreen");
const select = document.getElementById("selectScreen");

if(form.style.display === "block"){
  form.style.display = "none";
  select.style.display = "block";
  return;
}

window.location.href = "home.html";

}

/* SUBMIT */
function submitFinal(){

alert("Report Submitted!");
window.location.href = "home.html";

}

/* NAV */
function goHome(){ window.location.href="home.html"; }
function goRoutes(){ window.location.href="routes.html"; }
function goCommunity(){ window.location.href="community.html"; }
function goAccount(){ window.location.href="account.html"; }
function goReport(){ window.location.href="report.html"; }

</script>

</body>
</html>
