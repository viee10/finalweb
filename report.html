<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Report</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f2f2f2;
}

/* HEADER */
.header {
  background: #2c00cc;
  color: white;
  padding: 15px;
  font-size: 24px;
  font-weight: bold;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  padding: 20px;
}

/* BOX */
.box {
  height: 150px;
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-weight: bold;
  font-size: 22px;
  box-shadow: 0 6px 10px rgba(0,0,0,0.2);
  cursor: pointer;
  transition: 0.2s;
}

.box small {
  font-size: 12px;
  margin-top: 5px;
}

/* COLORS */
.green { background: #10b35a; color: white; }
.yellow { background: #f4c400; }
.red { background: #ff2d2d; color: white; }
.gray { background: #ddd; }

/* SELECTED EFFECT */
.selected {
  outline: 4px solid #2c00cc;
}

/* BUTTON */
.btn {
  width: 90%;
  margin: 20px auto;
  display: block;
  padding: 15px;
  background: #2c00cc;
  color: white;
  border: none;
  border-radius: 20px;
  font-size: 18px;
  cursor: pointer;
}

/* CANCEL */
.cancel {
  text-align: center;
  color: red;
  margin-bottom: 20px;
  cursor: pointer;
}

/* NAV */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
}

.nav-item {
  text-align: center;
  font-size: 12px;
}

.report-btn {
  background: red;
  padding: 15px;
  border-radius: 15px;
  margin-top: -20px;
}

</style>

</head>

<body>

<div class="header">REPORT</div>

<div id="selectScreen">
  <div class="grid">

  <div class="box green" onclick="selectBox(this, 'EMPTY - LARGA')">
    EMPTY - LARGA
    <small>Plenty of Jeeps</small>
  </div>

  <div class="box yellow" onclick="selectBox(this, 'MODERATE')">
    MODERATE
    <small>Wait &lt; 10 mins</small>
  </div>

  <div class="box red" onclick="selectBox(this, 'SUPER PUNO')">
    SUPER PUNO
    <small>Wait &gt; 20 mins</small>
  </div>

  <div class="box gray" onclick="selectBox(this, 'NO JEEPS')">
    NO JEEPS
    <small>Wala pa</small>
  </div>
</div>

<button class="btn" onclick="goNext()">NEXT</button>

<div class="cancel" onclick="goHome()">&lt; CANCEL &gt;</div>
</div> <!-- END selectScreen -->

<!-- NAV -->
<div class="nav">
  <div class="nav-item" onclick="goHome()">🏠<br>HOME</div>
  <div class="nav-item" onclick="goRoutes()">🗺️<br>ROUTES</div>
  <div class="nav-item" onclick="goReport()">REPORT</div>
  <div class="nav-item" onclick="goCommunity()">🔔<br>COMMUNITY</div>
  <div class="nav-item" onclick="goAccount()">👤ACCOUNT</div>
</div>

<script>
let selectedReport = "";

function selectBox(element, value) {
  document.querySelectorAll('.box').forEach(box => {
    box.classList.remove('selected');
  });

  element.classList.add('selected');
  selectedReport = value;
}

function goNext() {
  if (selectedReport === "") {
    alert("Please select first!");
    return;
  }

  document.getElementById("selectScreen").style.display = "none";
  document.getElementById("formScreen").style.display = "block";
}

function goBack() {
  document.getElementById("formScreen").style.display = "none";
  document.getElementById("selectScreen").style.display = "block";
}

function submitFinal() {
  alert("Report submitted: " + selectedReport);
}

function goHome() { window.location.href = "home.html"; }
function goRoutes() { window.location.href = "routes.html"; }
function goCommunity() { window.location.href = "community.html";}
function goAccount() { window.location.href = "account.html";}
function goReport() { window.location.href = "report.html"; }
</script>


<div id="formScreen" style="display:none; padding:20px;">

  <h2>MAP MARKET PLACEMENT</h2>
  <input placeholder="Map marker Area...." style="width:100%; padding:10px;">

  <h2>TEXT DESCRIPTION</h2>
  <textarea style="width:100%; height:100px;"></textarea>

  <h2>JEEPNEY FARE</h2>
  <div style="display:flex; gap:10px;">
    <div style="background:#ddd; padding:10px;">✔ STANDARD FARE</div>
    <input placeholder="₱ Fare" style="flex:1;">
  </div>

  <h2>PHOTO UPLOAD</h2>
  <input type="file">

  <button onclick="submitFinal()">SUBMIT REPORT</button>
  <p onclick="goBack()" style="color:red; cursor:pointer;">&lt; CANCEL &gt;</p>

</div>

</body>
</html>
